# fly.toml app configuration file generated for rift-legends on 2026-03-06T19:16:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rift-legends'
primary_region = 'yyz'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = 'data'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
